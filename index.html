<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PBTI - 家长人格测试 | 辅导作业真相鉴定</title>
  <style>
    :root {
      --primary: #E8734A;
      --primary-dark: #D45A2A;
      --primary-light: #FFF3ED;
      --secondary: #5BA8A0;
      --accent: #F5C563;
      --text-dark: #2D3436;
      --text-medium: #636E72;
      --text-light: #B2BEC3;
      --bg: #FFF9F5;
      --card-bg: #FFFFFF;
      --radius: 20px;
      --shadow: 0 8px 32px rgba(232,115,74,0.12);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      min-height: 100vh;
    }

    /* ===== 首页 ===== */
    .home-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 16px;
    }

    .logo-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--primary), #F5A66B);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin-bottom: 24px;
      box-shadow: 0 12px 40px rgba(232,115,74,0.3);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--secondary), #7BC4BB);
      color: white;
      font-size: 13px;
      padding: 6px 18px;
      border-radius: 20px;
      margin-bottom: 20px;
      letter-spacing: 1px;
      font-weight: 500;
    }

    .main-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .main-title span { color: var(--primary); }

    .subtitle {
      font-size: 15px;
      color: var(--text-medium);
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 14px;
      color: var(--text-light);
      margin-bottom: 36px;
    }

    .start-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      padding: 16px 56px;
      font-size: 17px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 28px rgba(232,115,74,0.35);
      letter-spacing: 1px;
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(232,115,74,0.45);
    }

    .start-btn:active {
      transform: translateY(0);
    }

    .home-features {
      margin-top: 48px;
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .feature-item {
      text-align: center;
      flex: 0 0 auto;
    }

    .feature-item .num {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
    }

    .feature-item .label {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ===== 答题页 ===== */
    .quiz-page { display: none; padding-top: 20px; }
    
    .quiz-header {
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      padding: 16px 0 12px;
    }

    .progress-bar {
      height: 6px;
      background: #EEE8E4;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #F5A66B);
      border-radius: 3px;
      transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .quiz-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .q-num {
      font-weight: 700;
      color: var(--primary);
      font-size: 16px;
    }

    .q-hint {
      color: var(--text-light);
      font-size: 13px;
    }

    .question-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .question-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .options-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      padding: 16px 20px;
      border: 2px solid #F0E8E4;
      border-radius: 14px;
      background: white;
      font-size: 15px;
      color: var(--text-dark);
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
      line-height: 1.5;
    }

    .option-btn:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      transform: translateX(4px);
    }

    .option-btn.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      position: relative;
    }

    .option-btn.selected::after {
      content: '✓';
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary);
      font-weight: 700;
      font-size: 18px;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .nav-btn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
      border: none;
    }

    .nav-btn.prev {
      background: #F5F0EE;
      color: var(--text-medium);
    }

    .nav-btn.prev:hover {
      background: #EBE5E2;
    }

    .nav-btn.next {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 16px rgba(232,115,74,0.25);
    }

    .nav-btn.next:hover {
      box-shadow: 0 6px 22px rgba(232,115,74,0.35);
    }

    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ===== 结果页 ===== */
    .result-page { display: none; text-align: center; padding-top: 20px; }

    .result-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 36px 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
    }

    .result-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), #F5A66B);
      color: white;
      font-size: 13px;
      padding: 6px 20px;
      border-radius: 20px;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .result-type-name {
      font-size: 36px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .result-type-en {
      font-size: 18px;
      color: var(--primary);
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 12px;
    }

    .result-tagline {
      font-size: 15px;
      color: var(--text-medium);
      font-style: italic;
      margin-bottom: 20px;
      padding: 0 12px;
    }

    .match-rate {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary-light);
      color: var(--primary-dark);
      padding: 8px 22px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .radar-section {
      margin: 28px 0;
    }

    .radar-title {
      font-size: 14px;
      color: var(--text-light);
      margin-bottom: 16px;
      font-weight: 500;
    }

    .radar-container {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
    }

    .radar-svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .result-desc {
      text-align: left;
      background: #FAFAFA;
      border-radius: 16px;
      padding: 24px 20px;
      margin-top: 24px;
    }

    .result-desc-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-desc-title::before {
      content: '💡';
    }

    .result-desc-text {
      font-size: 14.5px;
      color: var(--text-medium);
      line-height: 1.85;
    }

    .result-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .action-btn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .action-btn.share {
      background: linear-gradient(135deg, var(--secondary), #7BC4BB);
      color: white;
      box-shadow: 0 4px 16px rgba(91,168,160,0.25);
    }

    .action-btn.retest {
      background: #F5F0EE;
      color: var(--text-medium);
    }

    .action-btn:hover {
      transform: translateY(-2px);
    }

    .disclaimer {
      margin-top: 32px;
      padding: 16px 20px;
      background: #FEF8F5;
      border-radius: 12px;
      font-size: 12px;
      color: var(--text-light);
      line-height: 1.7;
      text-align: left;
    }

    /* 动画 */
    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 人格专属卡片图 */
    .personality-card {
      margin: 28px 0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      background: #fff;
    }

    .card-visual {
      height: 180px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-visual svg {
      width: 100%;
      height: 100%;
    }

    .card-body {
      padding: 24px 20px 20px;
      text-align: center;
    }

    .card-type-big {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 2px;
    }

    .card-en-big {
      font-size: 14px;
      color: var(--primary);
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 12px;
    }

    .card-line {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 2px;
      margin: 0 auto 14px;
    }

    .card-quote {
      font-size: 15px;
      color: var(--text-medium);
      font-style: italic;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .card-tags {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card-tag {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: #F5F0EE;
      color: var(--text-medium);
    }

    /* 响应式 */
    @media (max-width: 400px) {
      .main-title { font-size: 26px; }
      .question-text { font-size: 16px; }
      .result-type-name { font-size: 30px; }
      .container { padding: 16px 12px 32px; }
    }
  </style>
</head>
<body>

<!-- ==================== 首页 ==================== -->
<div class="home-page" id="homePage">
  <div class="logo-icon">👨‍👩‍👧</div>
  <div class="badge">MBTI已经过时 · PBTI来了</div>
  <h1 class="main-title"><span>家长</span>人格测试<br>辅导作业真相鉴定</h1>
  <p class="subtitle">30道题，测出你的真实育儿人格</p>
  <p class="tagline">不是你不够好，是你太真实了 🎯</p>
  
  <button class="start-btn" onclick="startQuiz()">开始测试</button>
  
  <div class="home-features">
    <div class="feature-item">
      <div class="num">30</div>
      <div class="label">道精选题目</div>
    </div>
    <div class="feature-item">
      <div class="num">10</div>
      <div class="label">种家长人格</div>
    </div>
    <div class="feature-item">
      <div class="num">15</div>
      <div class="label">维精准分析</div>
    </div>
  </div>
</div>

<!-- ==================== 答题页 ==================== -->
<div class="quiz-page container" id="quizPage">
  <div class="quiz-header">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="quiz-info">
      <span class="q-num" id="qNum">第 1 题 / 共 30 题</span>
      <span class="q-hint" id="qHint">选择最符合你的选项 →</span>
    </div>
  </div>
  
  <div class="question-card fade-in" id="questionCard">
    <p class="question-text" id="questionText"></p>
    <ul class="options-list" id="optionsList"></ul>
  </div>
  
  <div class="nav-buttons">
    <button class="nav-btn prev" id="prevBtn" onclick="prevQuestion()" disabled>上一题</button>
    <button class="nav-btn next" id="nextBtn" onclick="nextQuestion()">下一题</button>
  </div>
</div>

<!-- ==================== 结果页 ==================== -->
<div class="result-page container" id="resultPage">
  <div class="result-card fade-in">
    <div class="result-badge">你的家长人格是</div>
    <h2 class="result-type-name" id="resultName"></h2>
    <p class="result-type-en" id="resultEn"></p>
    <p class="result-tagline" id="resultTagline"></p>
    <div class="match-rate" id="matchRate">匹配度 --%</div>

    <!-- 人格专属卡片图 -->
    <div class="personality-card" id="personalityCard">
      <div class="card-visual" id="cardVisual"></div>
      <div class="card-body">
        <div class="card-type-big" id="cardTypeBig"></div>
        <div class="card-en-big" id="cardEnBig"></div>
        <div class="card-line"></div>
        <p class="card-quote" id="cardQuote"></p>
        <div class="card-tags" id="cardTags"></div>
      </div>
    </div>

    <div class="radar-section">
      <p class="radar-title">📊 十五维度能力雷达</p>
      <div class="radar-container">
        <svg class="radar-svg" id="radarSvg" viewBox="0 0 400 400"></svg>
      </div>
    </div>
    
    <div class="result-desc">
      <p class="result-desc-title">深度解读</p>
      <p class="result-desc-text" id="resultDesc"></p>
    </div>
    
    <div class="result-actions">
      <button class="action-btn share" onclick="shareResult()">📤 分享结果</button>
      <button class="action-btn retest" onclick="location.reload()">🔄 再测一次</button>
    </div>
  </div>
  
  <div class="disclaimer">
    ⚠️ 本测试纯属娱乐，基于互联网观察和幽默创作，不构成任何心理学诊断或育儿建议。
    无论测出什么类型，你都已经是孩子心中最好的家长了 ❤️
  </div>
</div>

<script>
// ============================================================
// 【题库】30道题目 × 3个选项 × 15个维度映射
// 维度分组：自我(S1-S3)、情感(E1-E3)、态度(A1-A3)、行动(Ac1-Ac3)、社交(So1-So3)
// 每个选项对该题目所属维度贡献 1/2/3 分（A=1分, B=2分, C=3分）
// ============================================================
const QUESTIONS = [
  // === 自我模型 (S1-S3) ===
  {
    q: "孩子考试考了78分，你的第一反应是？",
    options: ["深呼吸，先看错在哪里", "有点失落，但能接受", "怎么才78？！平时不是都复习了吗"],
    dims: ["self_confidence"], scores: [3, 2, 1]
  },
  {
    q: "辅导作业时，你觉得自己是一个什么样的家长？",
    options: ["还行吧，尽力就好", "有时候做得好，有时候不行", "我可能真的不太擅长这个……"],
    dims: ["self_clarity"], scores: [3, 2, 1]
  },
  {
    q: "\"做一个好家长\"对你来说意味着什么？",
    options: ["陪伴和爱就够了", "成绩和习惯都要抓", "什么都想给孩子最好的"],
    dims: ["self_value"], scores: [1, 2, 3]
  },

  // === 情感模型 (E1-E3) ===
  {
    q: "孩子哭闹着不肯写作业，你会？",
    options: ["抱抱他，等情绪好了再说", "讲道理，告诉他必须写完", "我也很崩溃但强忍着不发火"],
    dims: ["emotion_security"], scores: [3, 2, 1]
  },
  {
    q: "你对孩子的学习投入了多少情感精力？（诚实回答）",
    options: ["该关心就关心，不会过度操心", "挺多的，每天都会想这事", "全部身心都在这上面了"],
    dims: ["emotion_invest"], scores: [1, 2, 3]
  },
  {
    q: "孩子说\"妈妈/爸爸我自己的事我自己管\"，你心里？",
    options: ["好嘞，终于解放了", "有点不放心但还是尊重", "不行，你还小不懂事"],
    dims: ["emotion_boundary"], scores: [3, 2, 1]
  },

  // === 态度模型 (A1-A3) ===
  {
    q: "看到朋友圈里别人家孩子又拿了什么奖，你通常？",
    options: ["点赞恭喜，内心毫无波澜", "会想一下我家孩子是不是落下了", "焦虑感立刻涌上心头"],
    dims: ["attitude_worldview"], scores: [3, 2, 1]
  },
  {
    q: "对于\"快乐教育\"vs\"严格管教\"，你的立场更接近？",
    options: ["孩子开心最重要", "该严的时候严，该松的时候松", "不逼一把不知道孩子多优秀"],
    dims: ["attitude_rules"], scores: [1, 2, 3]
  },
  {
    q: "你觉得孩子未来的成功取决于？",
    options: ["他自己的选择和努力", "家庭教育和引导很重要", "从小就得铺好路不然来不及"],
    dims: ["attitude_meaning"], scores: [1, 2, 3]
  },

  // === 行动模型 (Ac1-Ac3) ===
  {
    q: "晚上9点，孩子还有一堆作业没做完，你会？",
    options: ["让他自己安排，做不完就做不完", "陪着他，但不催得太紧", "坐在旁边一道一道盯着做完"],
    dims: ["act_motivation"], scores: [1, 2, 3]
  },
  {
    q: "给孩子报兴趣班/补习班时，你的决策风格是？",
    options: ["孩子喜欢就报", "对比几家再做决定", "周围人都报了我们也不能落下"],
    dims: ["act_decision"], scores: [1, 2, 3]
  },
  {
    q: "周末的计划通常是？",
    options: ["随缘，走到哪算哪", "有大致安排但也灵活调整", "精确到小时的行程表"],
    dims: ["act_execute"], scores: [1, 2, 3]
  },

  // === 社交模型 (So1-So3) ===
  {
    q: "家长群里老师发了成绩排名，你会？",
    options: ["默默看完就不说话了", "私下看看自家孩子的位置", "立刻截图发家人群讨论"],
    dims: ["social_initiative"], scores: [1, 2, 3]
  },
  {
    q: "其他家长跟你抱怨自家孩子，你通常会？",
    options: ["听着附和几句", "分享自己的经历一起吐槽", "忍不住给对方提建议"],
    dims: ["social_boundary"], scores: [1, 2, 3]
  },
  {
    q: "在朋友面前提到自己的孩子，你更倾向于？",
    options: ["实话实说，好的不好的都说", "多说优点少说缺点", "基本只说好的方面"],
    dims: ["social_authenticity"], scores: [3, 2, 1]
  },

  // === 第二轮：自我模型 ===
  {
    q: "如果用一句话形容你辅导作业的状态， closest 的是？",
    options: ["佛系青年带娃版", "在崩溃边缘反复横跳", "情绪稳定得像AI"],
    dims: ["self_confidence"], scores: [2, 1, 3]

// ============================================================
// 状态变量
// ============================================================
let currentQ = 0;
let answers = new Array(QUESTIONS.length).fill(null);

// ============================================================
// 页面切换
// ============================================================
function startQuiz() {
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('quizPage').style.display = 'block';
  renderQuestion();
}

function showPage(pageId) {
  document.getElementById('homePage').style.display = pageId === 'home' ? 'flex' : 'none';
  document.getElementById('quizPage').style.display = pageId === 'quiz' ? 'block' : 'none';
  document.getElementById('resultPage').style.display = pageId === 'result' ? 'block' : 'none';
}

// ============================================================
// 渲染题目
// ============================================================
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('qNum').textContent = `第 ${currentQ + 1} 题 / 共 ${QUESTIONS.length} 题`;
  document.getElementById('progressFill').style.width = `${((currentQ) / QUESTIONS.length) * 100}%`;
  document.getElementById('questionText').textContent = q.q;

  const optsEl = document.getElementById('optionsList');
  optsEl.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[currentQ] === idx ? ' selected' : '');
    btn.textContent = `${['A','B','C'][idx]}. ${opt}`;
    btn.onclick = () => selectOption(idx);
    li.appendChild(btn);
    optsEl.appendChild(li);
  });

  // 动画
  const card = document.getElementById('questionCard');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');

  updateNavButtons();
}

function selectOption(idx) {
  answers[currentQ] = idx;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => b.classList.toggle('selected', i === idx));
  updateNavButtons();
}

function updateNavButtons() {
  document.getElementById('prevBtn').disabled = currentQ === 0;
  const nextBtn = document.getElementById('nextBtn');
  if (currentQ === QUESTIONS.length - 1) {
    nextBtn.textContent = '查看结果';
    nextBtn.disabled = answers.includes(null);
  } else {
    nextBtn.textContent = '下一题';
    nextBtn.disabled = false;
  }
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

function nextQuestion() {
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion();
  } else if (!answers.includes(null)) {
    showResult();
  }
}

// ============================================================
// 计算结果
// ============================================================
function calculateScores() {
  // 初始化15个维度分数
  let dimScores = {};
  DIM_KEYS.forEach(k => dimScores[k] = 0);

  QUESTIONS.forEach((q, qi) => {
    if (answers[qi] !== null) {
      const dim = q.dims[0];
      const score = q.scores[answers[qi]]; // A=1, B=2, or C=3
      dimScores[dim] += score;
    }
  });

  // 归一化到0-100（每个维度2道题，总分2-6分 → 映射为0-100）
  let normalized = {};
  DIM_KEYS.forEach(k => {
    normalized[k] = Math.round(((dimScores[k] - 2) / 4) * 100);
    normalized[k] = Math.max(0, Math.min(100, normalized[k]));
  });

  return normalized;
}

function manhattanDistance(vec1, vec2) {
  let dist = 0;
  for (let i = 0; i < vec1.length; i++) {
    dist += Math.abs(vec1[i] - vec2[i]);
  }
  return dist;
}

function findBestMatch(normalizedScores) {
  // 将归一化的0-100转为1-3尺度来匹配模板
  let userVec = DIM_KEYS.map(k => {
    const v = normalizedScores[k];
    if (v >= 67) return 3;
    if (v <= 33) return 1;
    return 2;
  });

  let bestIdx = 0;
  let bestDist = Infinity;
  let distances = [];

  PERSONALITIES.forEach((p, idx) => {
    const d = manhattanDistance(userVec, p.template);
    distances.push(d);
    if (d < bestDist) {
      bestDist = d;
      bestIdx = idx;
    }
  });

  // 计算匹配度（距离越小匹配度越高，基于最大可能距离45）
  const maxPossibleDist = 30; // 15维 × 最大差值2
  const matchPct = Math.max(50, Math.round((1 - bestDist / maxPossibleDist) * 100));

  return { personality: PERSONALITIES[bestIdx], matchPct, distances };
}

// ============================================================
// 显示结果
// ============================================================
function showResult() {
  showPage('result');
  const scores = calculateScores();
  const result = findBestMatch(scores);
  const p = result.personality;

  document.getElementById('resultName').textContent = p.name;
  document.getElementById('resultEn').textContent = p.en;
  document.getElementById('resultTagline').textContent = `"${p.tagline}"`;
  document.getElementById('matchRate').innerHTML = `匹配度 ${result.matchPct}%`;

  // 渲染人格专属卡片图
  if (p.visual) {
    document.getElementById('cardVisual').innerHTML = p.visual;
    document.getElementById('cardTypeBig').textContent = p.name;
    document.getElementById('cardEnBig').textContent = p.en;
    document.getElementById('cardQuote').textContent = `"${p.tagline}"`;
    
    // 渲染标签
    const tagsEl = document.getElementById('cardTags');
    tagsEl.innerHTML = '';
    (p.tags || []).forEach(tag => {
      const span = document.createElement('span');
      span.className = 'card-tag';
      span.textContent = tag;
      tagsEl.appendChild(span);
    });
  }

  document.getElementById('resultDesc').innerHTML = p.desc.replace(/\n\n/g, '</p><p style="margin-top:12px;">').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

  // 绘制雷达图
  setTimeout(() => drawRadarChart(scores), 300);
}

// ============================================================
// 雷达图绘制（SVG方案，100%可靠）
// ============================================================
function drawRadarChart(scores) {
  const svg = document.getElementById('radarSvg');
  if (!svg) return;

  const cx = 200, cy = 200, radius = 130;
  const levels = 5;
  const numDims = DIM_NAMES.length;
  const angleStep = (Math.PI * 2) / numDims;
  const startAngle = -Math.PI / 2;

  let svgContent = '';

  // 背景网格（多边形）
  for (let lv = 1; lv <= levels; lv++) {
    let pts = '';
    for (let i = 0; i < numDims; i++) {
      const a = startAngle + i * angleStep;
      const r = (radius / levels) * lv;
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      pts += `${x.toFixed(1)},${y.toFixed(1)} `;
    }
    svgContent += `<polygon points="${pts.trim()}" fill="none" stroke="${lv===levels?'#DDD':'#F0EDE8'}" stroke-width="${lv===levels?1.2:0.6}"/>`;
  }

  // 轴线
  for (let i = 0; i < numDims; i++) {
    const a = startAngle + i * angleStep;
    svgContent += `<line x1="${cx}" y1="${cy}" x2="${(cx+radius*Math.cos(a)).toFixed(1)}" y2="${(cy+radius*Math.sin(a)).toFixed(1)}" stroke="#EEE8E4" stroke-width="0.6"/>`;
  }

  // 数据区域
  const dataVals = DIM_KEYS.map(k => scores[k]);
  let dataPts = '';
  for (let i = 0; i < numDims; i++) {
    const a = startAngle + i * angleStep;
    const val = dataVals[i] / 100;
    const x = cx + radius * val * Math.cos(a);
    const y = cy + radius * val * Math.sin(a);
    dataPts += `${x.toFixed(1)},${y.toFixed(1)} `;
  }
  svgContent += `<polygon points="${dataPts.trim()}" fill="rgba(232,115,74,0.18)" stroke="#E8734A" stroke-width="2" stroke-linejoin="round"/>`;

  // 数据点
  for (let i = 0; i < numDims; i++) {
    const a = startAngle + i * angleStep;
    const val = dataVals[i] / 100;
    const x = cx + radius * val * Math.cos(a);
    const y = cy + radius * val * Math.sin(a);
    svgContent += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4.5" fill="#E8734A" stroke="#fff" stroke-width="1.5"/>`;
  }

  // 标签
  for (let i = 0; i < numDims; i++) {
    const a = startAngle + i * angleStep;
    const lr = radius + 24;
    let lx = cx + lr * Math.cos(a);
    let ly = cy + lr * Math.sin(a);

    // 微调对齐
    let anchor = 'middle', dx = 0, dy = 0;
    if (Math.abs(Math.cos(a)) > 0.85) { dy = Math.sin(a) > 0 ? 12 : -10; anchor = 'middle'; }
    else if (Math.abs(Math.sin(a)) > 0.85) { anchor = Math.cos(a) > 0 ? 'start' : 'end'; dy = 4; }
    else { anchor = 'middle'; dy = Math.sin(a) > 0 ? 14 : -8; }

    lx += dx; ly += dy;
    svgContent += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anchor}" fill="#636E72" font-size="11" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">${DIM_NAMES[i]}</text>`;
  }

  svg.innerHTML = svgContent;
}

// ============================================================
// 分享功能
// ============================================================
function shareResult() {
  const name = document.getElementById('resultName').textContent;
  const en = document.getElementById('resultEn').textContent;
  const tagline = document.getElementById('resultTagline').textContent;
  const matchPct = document.getElementById('matchRate').textContent;

  const text = `【我的家长人格测试结果】🎯\n${name} ${en}\n${tagline}\n${matchPct}\n\n👉 来测测你是哪种家长人格！`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      alert('✅ 结果已复制到剪贴板，快去分享吧！');
    }).catch(() => {
      fallbackShare(text);
    });
  } else {
    fallbackShare(text);
  }
}

function fallbackShare(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); alert('✅ 结果已复制！'); } catch(e) {}
  document.body.removeChild(ta);
}
</script>
